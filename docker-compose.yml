# ScyllaDB with Alternator (DynamoDB-compatible API) for Coolify + Traefik.
# Domains: assign in the Coolify UI per service (not env vars). Coolify injects
# SERVICE_FQDN_SCYLLA / SERVICE_FQDN_SCYLLA_ADMIN and Traefik labels automatically.

services:
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla-alternator
    restart: unless-stopped
    command:
      - --smp
      - "1"
      - --memory
      - "2G"
      - --overprovisioned
      - "1"
      - --alternator-port
      - "8000"
      - --alternator-address
      - "0.0.0.0"
      - --alternator-write-isolation
      - always
      - --alternator-enforce-authorization
      - ${ALTERNATOR_AUTH_ENABLED:-false}
      - --alternator-warn-authorization
      - ${ALTERNATOR_AUTH_WARN:-false}
      # CQL auth — required to create Alternator users (roles stored in scylla-data volume)
      - --authenticator
      - PasswordAuthenticator
      - --authorizer
      - CassandraAuthorizer
    volumes:
      - scylla-data:/var/lib/scylla
    expose:
      - "8000" # Alternator (DynamoDB API) — routed via Traefik
      - "9042" # CQL — internal only, not exposed via Traefik
    healthcheck:
      # GET / returns "healthy: <host>:8000" (no auth required)
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/ | grep -q '^healthy:'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # Routing: assign a domain to the `scylla` service in Coolify (port 8000).
    # Coolify generates Traefik labels; do not set SCYLLA_HOST in the env panel.

  scylla-bootstrap:
    build: ./bootstrap
    user: "0:0"
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - scylla-data:/var/lib/scylla
      - admin-secrets:/secrets
    environment:
      - SCYLLA_CQL_PASSWORD=${SCYLLA_CQL_PASSWORD:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "set -euo pipefail; source /bootstrap/cql-password.sh"
    restart: "no"

  scylla-admin:
    build: ./admin-ui
    restart: unless-stopped
    depends_on:
      scylla:
        condition: service_healthy
      scylla-bootstrap:
        condition: service_completed_successfully
    volumes:
      - admin-secrets:/secrets:ro
    environment:
      - SCYLLA_CQL_HOST=scylla
      - SCYLLA_CQL_PORT=9042
      - SCYLLA_CQL_USER=cassandra
      - SCYLLA_CQL_PASSWORD_FILE=/secrets/cql-password
      - SCYLLA_CQL_PASSWORD=${SCYLLA_CQL_PASSWORD:-}
      - ALTERNATOR_ENDPOINT=http://scylla:8000
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Routing: assign a domain to the `scylla-admin` service in Coolify (port 3000).

volumes:
  scylla-data:
  admin-secrets:
